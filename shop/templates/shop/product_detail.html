{% extends 'shop/base.html' %}

{% block content %}
<div class="row">
  <div class="col-md-6">
    {% if product.image_url %}
      <img src="{{ product.image_url }}" class="img-fluid rounded mb-4" alt="{{ product.name }}">
    {% endif %}
  </div>
  <div class="col-md-6">
    <h1>{{ product.name }}</h1>
    <p class="text-muted">Category: {{ product.category.name }}</p>
    <p class="lead">${{ product.price }}</p>
    <p>{{ product.description }}</p>
    <a href="{% url 'shop:add_to_cart' product.slug %}" class="btn btn-success btn-lg">Add to cart</a>
    <a href="{% url 'shop:home' %}" class="btn btn-link">Back to shop</a>
  </div>
</div>
{% endblock %}
